---
name: Release

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  # for security reasons we lint before any other code gets executed
  lint:
    name: Lint
    uses: infinite-automations/workflows/.github/workflows/lint.yml@6a56d002d825974b7405bf096d1b37dfc414bc5e # v1.3.0
    permissions:
      contents: read
      packages: read
      statuses: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-lint
      cancel-in-progress: true

  test:
    name: Tests
    needs:
      - lint
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-test
      cancel-in-progress: true
    uses: ./.github/workflows/tests.yml

  release:
    name: Release
    needs:
      - test
    permissions:
      contents: write
      issues: write
      packages: read
      pull-requests: write
      statuses: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-release
      cancel-in-progress: false
    uses: infinite-automations/workflows/.github/workflows/ci-terraform-module.yml@6a56d002d825974b7405bf096d1b37dfc414bc5e # v1.3.0
    with:
      dry-run: ${{ github.event_name == 'pull_request' }}
      skip-lint: true
      semrel-extra-plugins: |
        semantic-release-replace-plugin
        semantic-release-major-tag
    secrets:
      APP_ID: ${{ secrets.APP_ID_SEMREL }}
      APP_PRIVATE_KEY: ${{ secrets.APP_KEY_SEMREL }}
